<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Match App - 恋愛マッチング</title>
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MATCH">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 読み込み中画面 -->
    <div id="loadingScreen" class="screen active">
        <div class="loading-content">
            <div class="logo">💕 MATCH</div>
            <p style="color:white;margin-top:16px;">読み込み中...</p>
        </div>
    </div>

    <!-- 認証画面 -->
    <div id="authScreen" class="screen">
        <div class="auth-container">
            <div class="logo">💕 MATCH</div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showAuthTab('register')">新規登録</button>
                <button class="auth-tab" onclick="showAuthTab('login')">ログイン</button>
            </div>

            <form id="registerForm" class="auth-form">
                <input type="text" id="regIdentifier" placeholder="メールアドレス" required>
                <input type="password" id="regPassword" placeholder="パスワード（6文字以上）" minlength="6" required>
                <input type="password" id="regPasswordConfirm" placeholder="パスワード確認" required>
                <input type="text" id="regName" placeholder="あなたの名前" required>
                <input type="number" id="regAge" placeholder="年齢" min="18" max="99" required>
                <div class="auth-error" id="registerError"></div>
                <button type="submit" class="btn-primary">登録する</button>
            </form>

            <form id="loginForm" class="auth-form" style="display:none">
                <input type="text" id="loginIdentifier" placeholder="メールアドレス" required>
                <input type="password" id="loginPassword" placeholder="パスワード" required>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="btn-primary">ログイン</button>
            </form>
        </div>
    </div>

    <!-- スワイプ画面 -->
    <div id="swipeScreen" class="screen">
        <div class="swipe-header">
            <button class="btn-profile" onclick="openProfile()" id="profileBtn">?</button>
            <h2>素敵な人を見つけよう</h2>
            <div class="header-right-btns">
                <button class="btn-header-icon" onclick="openLikesScreen()">
                    ❤️<span class="history-badge" id="likesBadge" style="display:none">0</span>
                </button>
                <button class="btn-history" onclick="openMatchesScreen()" id="historyBtn">
                    💬<span class="history-badge" id="historyBadge" style="display:none">0</span>
                </button>
            </div>
        </div>

        <div class="swipe-container">
            <div id="cardStack" class="card-stack">
                <!-- カードがJavaScriptで動的に追加される -->
            </div>
        </div>

        <div class="swipe-buttons">
            <button class="btn-nope" onclick="swipeLeft()">💔 No</button>
            <button class="btn-like" onclick="swipeRight()">❤️ Like</button>
        </div>

        <div class="match-counter">
            <p id="matchCount">マッチ: 0件</p>
        </div>
    </div>

    <!-- マッチ完了画面 -->
    <div id="matchScreen" class="screen">
        <div class="match-celebration">
            <div class="confetti"></div>
            <h1>✨ マッチしました！✨</h1>
            <img id="matchedPersonImg" src="" alt="" class="match-person-img">
            <p id="matchMessage"></p>
            <div class="match-buttons">
                <button class="btn-primary btn-message-jump" onclick="goToMessaging()">💬 メッセージ画面に飛びますか？</button>
                <button class="btn-skip" onclick="backToSwipe()">もっと探す</button>
            </div>
        </div>
    </div>

    <!-- いいね！画面 -->
    <div id="likesScreen" class="screen">
        <div class="messaging-container">
            <div class="messaging-header">
                <button class="btn-back" onclick="backToSwipeFromLikes()">← 戻る</button>
                <h2>❤️ いいね！された</h2>
                <div></div>
            </div>
            <div class="matches-list" id="likesList"></div>
        </div>
    </div>

    <!-- いいね！ユーザープロフィール詳細画面 -->
    <div id="userProfileScreen" class="screen">
        <div class="user-profile-container">
            <div class="user-profile-image-section">
                <button class="btn-back user-profile-back" onclick="backToLikes()">← 戻る</button>
                <img id="profileViewImage" src="" alt="" class="user-profile-main-img" onerror="this.src='https://i.pravatar.cc/400?img=1'">
                <button class="img-nav img-nav-prev" id="profileViewPrev" style="display:none">&#8249;</button>
                <button class="img-nav img-nav-next" id="profileViewNext" style="display:none">&#8250;</button>
                <div class="img-dots" id="profileViewDots"></div>
            </div>
            <div class="user-profile-info-section">
                <div class="user-profile-name-row">
                    <span class="user-profile-name" id="profileViewName"></span>
                    <span class="user-profile-age" id="profileViewAge"></span>
                </div>
                <p class="user-profile-bio" id="profileViewBio"></p>
            </div>
            <div class="user-profile-action">
                <button class="btn-like-profile" onclick="likeFromProfile()">❤️ いいね！する</button>
            </div>
        </div>
    </div>

    <!-- メッセージ画面 -->
    <div id="messagingScreen" class="screen">
        <div class="messaging-container">
            <div class="messaging-header">
                <button class="btn-back" onclick="backToMatch()">← 戻る</button>
                <h2>マッチした人たち</h2>
                <div></div>
            </div>

            <div class="matches-list" id="matchesList">
                <!-- マッチした人のリストが表示される -->
            </div>
        </div>
    </div>

    <!-- チャット画面 -->
    <div id="chatScreen" class="screen">
        <div class="chat-container">
            <div class="chat-header">
                <button class="btn-back" onclick="backToMatches()">← マッチ一覧</button>
                <div class="chat-profile">
                    <img id="chatProfileImage" src="" alt="" class="chat-avatar">
                    <div>
                        <h3 id="chatPartnerName"></h3>
                        <p id="chatPartnerAge"></p>
                    </div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <!-- メッセージがここに表示される -->
            </div>

            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="メッセージを入力..." maxlength="500">
                <button class="btn-send" onclick="sendMessage()">&#10148;</button>
            </div>
        </div>
    </div>

    <!-- プロフィールドロワー -->
    <div class="profile-overlay" id="profileOverlay" onclick="closeProfile()"></div>
    <div class="profile-drawer" id="profileDrawer">
        <div class="profile-drawer-header">
            <div class="profile-drawer-avatar-wrap">
                <div class="profile-drawer-avatar" id="drawerAvatar">?</div>
                <button class="avatar-edit-btn" onclick="triggerPhotoUpload()">📷</button>
            </div>
            <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoChange(event)">
            <div class="profile-drawer-name" id="drawerName"></div>
            <div class="profile-drawer-age" id="drawerAge"></div>
        </div>
        <div class="profile-drawer-body">
            <div class="profile-drawer-row">
                <span class="profile-drawer-label">アカウント</span>
                <span class="profile-drawer-value" id="drawerIdentifier"></span>
            </div>
            <div class="profile-drawer-row">
                <div class="profile-drawer-row-header">
                    <span class="profile-drawer-label">写真（最大3枚）</span>
                    <span class="profile-drawer-label" id="photoCount">0 / 3</span>
                </div>
                <div class="profile-photos-grid" id="profilePhotosGrid"></div>
                <input type="file" id="profilePhotoInput" accept="image/*" style="display:none" onchange="handleProfilePhotoAdd(event)">
            </div>
            <div class="profile-drawer-row">
                <div class="profile-drawer-row-header">
                    <span class="profile-drawer-label">自己紹介</span>
                    <button class="bio-edit-btn" id="bioEditBtn" onclick="toggleBioEdit()">編集</button>
                </div>
                <div id="bioDisplay" class="bio-display">未設定</div>
                <div id="bioEditArea" style="display:none">
                    <textarea id="bioInput" class="bio-textarea" placeholder="自己紹介を書いてみよう..." maxlength="200"></textarea>
                    <div class="bio-actions">
                        <button class="bio-cancel-btn" onclick="cancelBioEdit()">キャンセル</button>
                        <button class="bio-save-btn" onclick="saveBio()">保存</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="profile-drawer-footer">
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="profiles.js"></script>
    <script src="script.js"></script>
</body>
</html>
